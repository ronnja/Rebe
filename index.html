<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#EDE8E0; }
canvas { display:block; }
#overlay {
  position:fixed; inset:0; background:#EDE8E0;
  pointer-events:none; z-index:10;
  transition: opacity 2.8s ease-in-out;
}
</style>
</head>
<body>
<div id="overlay"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const overlay = document.getElementById('overlay');

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xEDE8E0);
scene.fog = new THREE.Fog(0xEDE8E0, 12, 22);

const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.01, 100);
const START_POS = new THREE.Vector3(0.05, 0.02, 0.14);
const END_POS   = new THREE.Vector3(0.8, 0.6, 6.5);
camera.position.copy(START_POS);
camera.lookAt(0, 0, 0);

// Lights — soft, directional, like a gallery
scene.add(new THREE.AmbientLight(0xfff8f0, 0.7));

const key = new THREE.DirectionalLight(0xfff8f2, 1.8);
key.position.set(3, 10, 5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1;
key.shadow.camera.far = 30;
key.shadow.camera.left = -8;
key.shadow.camera.right = 8;
key.shadow.camera.top = 8;
key.shadow.camera.bottom = -8;
key.shadow.bias = -0.002;
scene.add(key);

const fill = new THREE.DirectionalLight(0xe8eeff, 0.3);
fill.position.set(-5, 3, -2);
scene.add(fill);

// Ground — subtle shadow only
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.ShadowMaterial({ opacity: 0.10 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.2;
ground.receiveShadow = true;
scene.add(ground);

// ── Three sculptures only ─────────────────────────────────

// 1. Large: a flattened, wide organic form — like a thick stone slab
function makeSlab() {
  const geo = new THREE.SphereGeometry(1, 128, 128);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);
    // Flatten Z, stretch X slightly
    pos.setX(i, x * 1.55);
    pos.setY(i, y * 1.35);
    pos.setZ(i, z * 0.38);
    // Subtle organic wobble
    const n = Math.sin(x*3.2)*Math.cos(y*2.8)*0.06;
    pos.setZ(i, pos.getZ(i) + n);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

// 2. Medium: tall narrow twisted column
function makeColumn() {
  const geo = new THREE.CylinderGeometry(0.28, 0.38, 2.8, 80, 60);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i);
    const a = y * 0.55;
    const x = pos.getX(i), z = pos.getZ(i);
    pos.setX(i, x*Math.cos(a) - z*Math.sin(a));
    pos.setZ(i, x*Math.sin(a) + z*Math.cos(a));
    // Subtle bulge
    const bulge = 1 + Math.sin((y/2.8 + 0.5) * Math.PI) * 0.12;
    pos.setX(i, pos.getX(i) * bulge);
    pos.setZ(i, pos.getZ(i) * bulge);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

// 3. Small: a smooth rounded disc — like a river stone
function makeDisc() {
  const geo = new THREE.SphereGeometry(0.7, 128, 128);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);
    pos.setX(i, x * 1.3);
    pos.setY(i, y * 0.9);
    pos.setZ(i, z * 0.5);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

const sculptures = [
  {
    geo: makeSlab(),
    pos: [-1.1, 0.0, 0],
    rot: [0.08, 0.18, 0.04],
    scale: [1, 1, 1],
    img: 'IMG_8332.jpeg',
  },
  {
    geo: makeColumn(),
    pos: [1.4, 0.0, -0.6],
    rot: [0.05, -0.22, 0.03],
    scale: [1, 1, 1],
    img: 'IMG_8334.jpeg',
  },
  {
    geo: makeDisc(),
    pos: [0.2, -1.1, 0.8],
    rot: [0.3, 0.5, 0.1],
    scale: [1, 1, 1],
    img: 'IMG_8330.jpeg',
  },
];

const loader = new THREE.TextureLoader();
const meshes = [];

sculptures.forEach((s, i) => {
  const mat = new THREE.MeshStandardMaterial({
    roughness: 0.75,
    metalness: 0.0,
    color: 0xd8d0c8,
  });

  loader.load(s.img, tex => {
    mat.map = tex;
    mat.color.set(0xffffff);
    mat.needsUpdate = true;
  });

  const mesh = new THREE.Mesh(s.geo, mat);
  mesh.position.set(...s.pos);
  mesh.rotation.set(...s.rot);
  mesh.scale.set(...s.scale);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData.baseRot = [...s.rot];
  mesh.userData.phase = i * 1.4;
  scene.add(mesh);
  meshes.push(mesh);
});

// ── Camera pull-back ──────────────────────────────────────
function easeOutExpo(t) { return t===1?1:1-Math.pow(2,-10*t); }
function easeInOutCubic(t) { return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

setTimeout(() => { overlay.style.opacity='0'; }, 300);

let clock=0, lastTime=null;
const PULL = 11.0; // slow, cinematic

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = lastTime ? Math.min((ts-lastTime)/1000, 0.05) : 0;
  lastTime = ts;
  clock += dt;

  const t  = Math.min(clock/PULL, 1);
  const te = easeOutExpo(t);
  const tc = easeInOutCubic(t);

  if (t < 1) {
    camera.position.lerpVectors(START_POS, END_POS, te);
    // gentle arc as it pulls back
    camera.position.x += Math.sin(t * Math.PI) * 0.4 * (1-t);
    camera.lookAt(new THREE.Vector3(
      (1-tc)*0.02,
      (1-tc)*0.01,
      0
    ));
    camera.fov = 38 - (1-te) * 18;
    camera.updateProjectionMatrix();
  } else {
    // Post reveal: very slow, barely perceptible drift
    const ot = (clock-PULL) * 0.018;
    camera.position.x = END_POS.x + Math.sin(ot) * 1.2;
    camera.position.y = END_POS.y + Math.sin(ot*0.6) * 0.3;
    camera.position.z = END_POS.z + Math.cos(ot*0.8) * 0.6;
    camera.lookAt(0, 0.1, 0);
    camera.fov = 38;
    camera.updateProjectionMatrix();
  }

  // Barely-there breathing
  meshes.forEach(m => {
    const ph = m.userData.phase;
    const b  = m.userData.baseRot;
    m.rotation.x = b[0] + Math.sin(clock*0.3+ph)*0.003;
    m.rotation.y = b[1] + Math.sin(clock*0.22+ph*1.1)*0.004;
    m.rotation.z = b[2] + Math.cos(clock*0.26+ph*0.8)*0.002;
  });

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

window.onresize = () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
};
</script>
</body>
</html>
