<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#EDE8E0; }
canvas { display:block; }
#overlay {
  position:fixed; inset:0; background:#EDE8E0;
  pointer-events:none; z-index:10;
  transition: opacity 3s ease-in-out;
}
</style>
</head>
<body>
<div id="overlay"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const overlay = document.getElementById('overlay');

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xEDE8E0);
scene.fog = new THREE.Fog(0xEDE8E0, 16, 26);

const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0.06, 0.02, 0.14);
camera.lookAt(0, 0, 0);

// Clean gallery light
scene.add(new THREE.AmbientLight(0xfff8f2, 0.9));
const key = new THREE.DirectionalLight(0xfffaf5, 1.8);
key.position.set(5, 9, 4);
scene.add(key);
const fill = new THREE.DirectionalLight(0xe8eeff, 0.4);
fill.position.set(-6, 1, -3);
scene.add(fill);
const topLight = new THREE.DirectionalLight(0xfff5e8, 0.3);
topLight.position.set(0, 10, 0);
scene.add(topLight);

// Load single painting
const loader = new THREE.TextureLoader();
let paintingTex = null;
loader.load('image1.png', tex => {
  paintingTex = tex;
  meshes.forEach(m => {
    m.material.map = tex;
    m.material.color.set(0xffffff);
    m.material.needsUpdate = true;
  });
});

function mat() {
  return new THREE.MeshStandardMaterial({
    roughness: 0.72,
    metalness: 0.0,
    color: 0xc8c0b8,
  });
}

// ── Abstract forms — clean, precise, sculptural ───────────

// 1. Tall monolith — very thin, upright slab. Like a Brancusi column.
function makeMonolith() {
  const g = new THREE.BoxGeometry(0.38, 3.2, 0.14, 2, 2, 2);
  // Taper slightly toward top
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    const y = p.getY(i);
    const t = (y / 3.2 + 0.5); // 0 at bottom, 1 at top
    const taper = 1 - t * 0.18;
    p.setX(i, p.getX(i) * taper);
    p.setZ(i, p.getZ(i) * taper);
  }
  p.needsUpdate = true;
  g.computeVertexNormals();
  return g;
}

// 2. Horizontal curved arc — like a bent plane, Hepworth-esque
function makeArc() {
  const curve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(-1.2, -0.3, 0),
    new THREE.Vector3(0,    0.7,  0.4),
    new THREE.Vector3(1.2, -0.3, 0)
  );
  const pts = curve.getPoints(60);
  const shape = new THREE.Shape();
  shape.moveTo(-0.12, 0);
  shape.lineTo( 0.12, 0);
  shape.lineTo( 0.12, 0.22);
  shape.lineTo(-0.12, 0.22);
  shape.closePath();
  const g = new THREE.TubeGeometry(
    new THREE.CatmullRomCurve3(pts), 60, 0.17, 24, false
  );
  return g;
}

// 3. Wide flat disc — very thin, like a blade or plate standing up
function makeBlade() {
  const g = new THREE.CylinderGeometry(1.1, 1.0, 0.10, 80, 4);
  // Tilt into an upright oval by rotating geometry
  const p = g.attributes.position;
  const angle = Math.PI / 2;
  for (let i = 0; i < p.count; i++) {
    const x = p.getX(i), y = p.getY(i), z = p.getZ(i);
    // rotate around X
    p.setY(i,  y * Math.cos(angle) - z * Math.sin(angle));
    p.setZ(i,  y * Math.sin(angle) + z * Math.cos(angle));
  }
  p.needsUpdate = true;
  g.computeVertexNormals();
  return g;
}

// 4. Ovoid — Brancusi egg, very clean
function makeOvoid() {
  const g = new THREE.SphereGeometry(0.72, 128, 128);
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    const y = p.getY(i);
    // Stretch top, compress bottom — classic egg
    const stretch = 1 + y * 0.28;
    p.setX(i, p.getX(i) * 0.82);
    p.setY(i, y * stretch);
    p.setZ(i, p.getZ(i) * 0.82);
  }
  p.needsUpdate = true;
  g.computeVertexNormals();
  return g;
}

// 5. Thin curved wedge — like a crescent or knife blade
function makeWedge() {
  const g = new THREE.CylinderGeometry(0.05, 0.9, 1.8, 48, 6);
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    const y = p.getY(i);
    // Bend it slightly
    const bend = y * y * 0.18;
    p.setZ(i, p.getZ(i) + bend);
    p.setX(i, p.getX(i) * (1 - Math.abs(y) * 0.1));
  }
  p.needsUpdate = true;
  g.computeVertexNormals();
  return g;
}

const sculptures = [
  { geo: makeArc(),      pos:[-2.2,  0.4, -0.6], rot:[0.1,  0.3,  0.05] },
  { geo: makeBlade(),    pos:[ 2.4, -0.1,  0.6], rot:[0.05, 0.5,  0.08] },
  { geo: makeOvoid(),    pos:[ 0.2, -0.6,  2.0], rot:[0.08, 0.2,  0.0]  },
  { geo: makeWedge(),    pos:[-0.8,  0.5, -2.2], rot:[0.12,-0.3,  0.06] },
];

const meshes = [];
sculptures.forEach(s => {
  const m = new THREE.Mesh(s.geo, mat());
  m.position.set(...s.pos);
  m.rotation.set(...s.rot);
  m.userData.baseRot = [...s.rot];
  m.userData.phase = meshes.length * 1.4;
  if (paintingTex) {
    m.material.map = paintingTex;
    m.material.color.set(0xffffff);
  }
  scene.add(m);
  meshes.push(m);
});

// ── Camera ────────────────────────────────────────────────
const PULL = 12.0;
const ORBIT_R = 7.2;
const ORBIT_Y = 0.6;
const ORBIT_SPEED = 0.016;
const ORBIT_START = Math.PI * 0.12;

function easeOutExpo(t) { return t===1?1:1-Math.pow(2,-10*t); }

setTimeout(() => { overlay.style.opacity='0'; }, 300);

let clock=0, lastTime=null;

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = lastTime ? Math.min((ts-lastTime)/1000, 0.05) : 0;
  lastTime = ts;
  clock += dt;

  if (clock < PULL) {
    const te = easeOutExpo(clock/PULL);
    const angle = ORBIT_START * (clock/PULL);
    const r = 0.14 + (ORBIT_R - 0.14) * te;
    const y = 0.02 + (ORBIT_Y - 0.02) * te;
    camera.position.set(Math.sin(angle)*r, y, Math.cos(angle)*r);
    camera.lookAt(0, 0.1, 0);
    camera.fov = 40 - (1-te)*20;
    camera.updateProjectionMatrix();
  } else {
    const ot = ORBIT_START + (clock-PULL)*ORBIT_SPEED;
    camera.position.set(
      Math.sin(ot)*ORBIT_R,
      ORBIT_Y + Math.sin((clock-PULL)*0.04)*0.4,
      Math.cos(ot)*ORBIT_R
    );
    camera.lookAt(0, 0.1, 0);
  }

  meshes.forEach(m => {
    const ph = m.userData.phase, b = m.userData.baseRot;
    m.rotation.x = b[0] + Math.sin(clock*0.28+ph)*0.003;
    m.rotation.y = b[1] + Math.sin(clock*0.20+ph*1.1)*0.004;
    m.rotation.z = b[2] + Math.cos(clock*0.24+ph*0.9)*0.002;
  });

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

window.onresize = () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
};
</script>
</body>
</html>
