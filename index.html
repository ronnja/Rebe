<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#EDE8E0; }
canvas { display:block; }
#overlay {
  position:fixed; inset:0; background:#EDE8E0;
  pointer-events:none; z-index:10;
  transition: opacity 3s ease-in-out;
}
</style>
</head>
<body>
<div id="overlay"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const overlay = document.getElementById('overlay');

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xEDE8E0);
scene.fog = new THREE.Fog(0xEDE8E0, 14, 24);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0.08, 0.04, 0.16);
camera.lookAt(0, 0, 0);

// Soft gallery lighting — no hard shadows
scene.add(new THREE.AmbientLight(0xfff8f2, 1.1));
const key = new THREE.DirectionalLight(0xfffaf5, 1.4);
key.position.set(4, 8, 5);
scene.add(key);
const fill = new THREE.DirectionalLight(0xe8eeff, 0.5);
fill.position.set(-6, 2, -3);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xfff0e8, 0.3);
rim.position.set(0, -4, -6);
scene.add(rim);

// ── Organic form generators ───────────────────────────────

function wobble(geo, amt) {
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const n = (Math.sin(x*4.1+y*2.3)*Math.cos(y*3.7+z*2.1)*Math.sin(z*3.3+x*1.8)) * amt;
    const len = Math.sqrt(x*x+y*y+z*z) || 1;
    pos.setXYZ(i, x+n*x/len, y+n*y/len, z+n*z/len);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

function makePebble(rx, ry, rz) {
  const g = new THREE.SphereGeometry(1, 128, 128);
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    p.setXYZ(i, p.getX(i)*rx, p.getY(i)*ry, p.getZ(i)*rz);
  }
  p.needsUpdate = true;
  return wobble(g, 0.055);
}

function makeTallVase(h) {
  const g = new THREE.CylinderGeometry(0.22, 0.32, h, 96, 64);
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    const y = p.getY(i);
    const t = (y/h + 0.5);
    // organic silhouette — narrow waist
    const profile = 0.7 + Math.sin(t * Math.PI) * 0.5 + Math.sin(t*Math.PI*2)*0.08;
    // twist
    const a = y * 0.45;
    const x = p.getX(i) * profile, z = p.getZ(i) * profile;
    p.setX(i, x*Math.cos(a) - z*Math.sin(a));
    p.setZ(i, x*Math.sin(a) + z*Math.cos(a));
  }
  p.needsUpdate = true;
  g.computeVertexNormals();
  return wobble(g, 0.03);
}

function makeWave() {
  // A flattened torus — like a folded ribbon
  const g = new THREE.TorusGeometry(0.9, 0.28, 64, 128);
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    p.setY(i, p.getY(i) * 0.35 + Math.sin(p.getX(i)*2.2)*0.12);
    p.setZ(i, p.getZ(i) * 0.55);
  }
  p.needsUpdate = true;
  g.computeVertexNormals();
  return wobble(g, 0.025);
}

function makeLens() {
  // Wide flat lens shape
  const g = new THREE.SphereGeometry(1, 128, 128);
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    p.setXYZ(i, p.getX(i)*1.6, p.getY(i)*1.1, p.getZ(i)*0.28);
  }
  p.needsUpdate = true;
  return wobble(g, 0.04);
}

function makeBoulder() {
  const g = new THREE.SphereGeometry(1, 128, 128);
  const p = g.attributes.position;
  for (let i = 0; i < p.count; i++) {
    p.setXYZ(i, p.getX(i)*1.1, p.getY(i)*0.88, p.getZ(i)*0.95);
  }
  p.needsUpdate = true;
  return wobble(g, 0.08);
}

// ── Scene layout — 5 forms, generously spaced ─────────────
const sculptures = [
  { geo: makeLens(),         pos:[-1.6,  0.1,  0.2], rot:[0.06, 0.22, 0.04], img:'IMG_8332.jpeg' },
  { geo: makeTallVase(2.9),  pos:[ 1.5,  0.0, -0.5], rot:[0.04,-0.18, 0.02], img:'IMG_8334.jpeg' },
  { geo: makePebble(0.9,0.75,0.6), pos:[ 0.1,-0.9,  1.0], rot:[0.2,  0.4,  0.1],  img:'IMG_8330.jpeg' },
  { geo: makeWave(),         pos:[ 0.4,  0.9, -1.2], rot:[0.3,  0.5,  0.15], img:'IMG_8333.jpeg' },
  { geo: makeBoulder(),      pos:[-0.3, -0.5, -1.6], rot:[0.1, -0.3,  0.05], img:'IMG_8329.jpeg' },
];

const loader = new THREE.TextureLoader();
const meshes = [];

sculptures.forEach(s => {
  const mat = new THREE.MeshStandardMaterial({
    roughness: 0.78,
    metalness: 0.0,
    color: 0xd0c8c0,
  });
  loader.load(s.img, tex => {
    mat.map = tex; mat.color.set(0xffffff); mat.needsUpdate = true;
  });
  const mesh = new THREE.Mesh(s.geo, mat);
  mesh.position.set(...s.pos);
  mesh.rotation.set(...s.rot);
  mesh.userData.baseRot = [...s.rot];
  mesh.userData.phase = meshes.length * 1.3;
  scene.add(mesh);
  meshes.push(mesh);
});

// ── Camera path ───────────────────────────────────────────
// Phase 1 (0–12s): pull back from inside texture, revealing the scene
// Phase 2 (12s+): slow continuous orbit around the group

const PULL = 12.0;
const ORBIT_R = 6.8;
const ORBIT_Y = 0.7;
const ORBIT_SPEED = 0.018; // very slow

function easeOutExpo(t) { return t===1?1:1-Math.pow(2,-10*t); }

// Start angle for orbit (matches where pull-back ends)
const ORBIT_START = Math.PI * 0.15;

setTimeout(() => { overlay.style.opacity = '0'; }, 300);

let clock = 0, lastTime = null;

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = lastTime ? Math.min((ts-lastTime)/1000, 0.05) : 0;
  lastTime = ts;
  clock += dt;

  if (clock < PULL) {
    const t  = clock / PULL;
    const te = easeOutExpo(t);

    // Pull back from 0.16 → orbit radius, while starting the orbit angle
    const angle = ORBIT_START * t;
    const r = 0.16 + (ORBIT_R - 0.16) * te;
    const y = 0.04 + (ORBIT_Y - 0.04) * te;

    camera.position.set(
      Math.sin(angle) * r,
      y,
      Math.cos(angle) * r
    );
    camera.lookAt(0, 0.1, 0);
    camera.fov = 42 - (1-te) * 20;
    camera.updateProjectionMatrix();

  } else {
    // Continuous orbit
    const ot = ORBIT_START + (clock - PULL) * ORBIT_SPEED;
    camera.position.set(
      Math.sin(ot) * ORBIT_R,
      ORBIT_Y + Math.sin((clock-PULL)*0.05) * 0.35,
      Math.cos(ot) * ORBIT_R
    );
    camera.lookAt(0, 0.1, 0);
    camera.fov = 42;
    camera.updateProjectionMatrix();
  }

  // Very subtle breathing
  meshes.forEach(m => {
    const ph = m.userData.phase;
    const b  = m.userData.baseRot;
    m.rotation.x = b[0] + Math.sin(clock*0.28+ph)*0.003;
    m.rotation.y = b[1] + Math.sin(clock*0.20+ph*1.1)*0.004;
    m.rotation.z = b[2] + Math.cos(clock*0.24+ph*0.9)*0.002;
  });

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

window.onresize = () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
};
</script>
</body>
</html>
